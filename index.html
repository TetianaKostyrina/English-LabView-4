<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT English Lab 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="title">IT Vocabulary Trainer</h1>
        
        <div id="menu" class="menu-grid">
            <button class="mode-btn" onclick="startMode('learn')">📖 Карточки</button>
            <button class="mode-btn" onclick="startMode('test')">📝 Тест</button>
            <button class="mode-btn" onclick="startMode('write')">✍️ Написание</button>
            <button class="mode-btn" onclick="startMode('list')">📋 Список</button>
        </div>

        <div id="game-area" class="hidden">
            <div id="content"></div>
            <button class="back-btn" onclick="location.reload()">← Назад</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
