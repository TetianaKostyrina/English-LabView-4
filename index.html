<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocabulary Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">
<h1>Тренажёр слов (RU ↔ EN)</h1>
<p>4 упражнения для запоминания</p>
</header>

<nav class="tabs">
<button class="tab active" data-tab="cards">1) RU → EN</button>
<button class="tab" data-tab="mcq">2) Перевод</button>
<button class="tab" data-tab="typing">3) Ввод</button>
<button class="tab" data-tab="match">4) Соответствия</button>
</nav>

<main class="container">

<section id="cards" class="panel active">
<h2>Выберите английское слово</h2>
<div id="t1Prompt" class="big"></div>
<div id="t1Options" class="options"></div>
<div id="t1Feedback"></div>
<button id="btnT1Next">Следующий</button>
</section>

<section id="mcq" class="panel">
<h2>Выберите перевод</h2>
<div id="mcqWord" class="big"></div>
<div id="mcqOptions"></div>
<div id="mcqFeedback"></div>
<button id="btnMcqNext">Следующий</button>
</section>

<section id="typing" class="panel">
<h2>Введите английское слово</h2>
<div id="typePrompt" class="big"></div>
<input id="typeInput" placeholder="Введите слово">
<button id="btnCheckType">Проверить</button>
<div id="typeFeedback"></div>
<button id="btnTypeNext">Следующий</button>
</section>

<section id="match" class="panel">
<h2>Сопоставьте пары</h2>

<div class="matchGrid">
<div>
<h3>EN</h3>
<div id="matchLeft"></div>
</div>

<div>
<h3>RU</h3>
<div id="matchRight"></div>
</div>
</div>

<div id="matchFeedback"></div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
